name: Generate and Deploy Documentation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Update Xcode Settings
        run: |
          set -euo pipefail
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES

      - name: Load Latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Generate DocC documentation
        run: |
          swift package --allow-writing-to-directory ./docs \
            generate-documentation \
            --target BunnyStreamAPI \
            --target BunnyStreamUploader \
            --target BunnyStreamPlayer \
            --target BunnyStreamCameraUpload \
            --enable-experimental-combined-documentation \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path bunny-stream-ios \
            --output-path ./docs

      - name: Add root redirect
        run: |
          cat > docs/index.html <<'EOF'
          <!DOCTYPE html>
          <meta charset="utf-8">
          <title>Bunny Stream iOS SDK Documentation</title>
          <meta http-equiv="refresh" content="0; url=./documentation/">
          <link rel="canonical" href="./documentation/">
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
